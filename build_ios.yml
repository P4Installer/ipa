name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest  # Вот тут мы запрашиваем виртуальный Mac
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Build iOS App
        run: |
          briefcase create ios
          briefcase build ios
          # На этом этапе создается проект Xcode в облаке
