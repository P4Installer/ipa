name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install flet requests

        - name: Build App
        run: |
          # Мы добавили -r requirements.txt
          flet build ipa --yes --product "P4Installer" --org com.p4team.installer -r requirements.txt

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: P4Installeк
          path: build/**/*.app
          if-no-files-found: error
