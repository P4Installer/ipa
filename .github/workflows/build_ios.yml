name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install flet requests

      - name: Build App
        run: |
          # 1. Check if the icon actually exists to prevent silent errors
          ls -lh image.png || echo "Icon not found at root!"
          
          # 2. Run the build
          # Tip: If image.png is in an assets folder, use --icon assets/image.png
          flet build ipa --module-name main --product "P4Installer" --org com.p4team.installer --icon "image.png" --no-prevent-sleep --verbose
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: P4Installer-IPA
          # На твоем скриншоте (image_7f59bd) путь был build/ipa
          path: build/**/*.app
          if-no-files-found: error
